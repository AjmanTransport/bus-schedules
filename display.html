<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="refresh" content="300"><!-- kiosk safety reload -->
  <title>Musalla Bus Station - Live Departures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root{
      --official-blue:#015c92;
      --official-gray:#a6a8ab;
      --bg1:#015c92;
      --bg2:#014e7e;
      --bg3:#013f66;
      --panel:rgba(1,92,146,.72);
      --panel2:rgba(1,92,146,.58);
      --text:#ffffff;
      --muted:rgba(255,255,255,.86);
      --line:#a6a8ab;
      --lineSoft:rgba(166,168,171,.88);
      --shadow:0 22px 70px rgba(0,30,60,.28);

      --font-ar-bold:"GE SS TWO Bold","GE SS Two Bold","GE SS Two","GE SS Two Medium","Cairo",Tahoma,Arial,sans-serif;
      --font-ar-medium:"GE SS TWO Medium","GE SS Two Medium","GE SS Two","Cairo",Tahoma,Arial,sans-serif;
      --font-en-bold:"Cairo","Segoe UI",Arial,sans-serif;

      --aj1:#ffffff; --aj2:#ffffff; --aj3:#ffffff; --aj4:#ffffff; --aj5:#ffffff;
      --aj6:#ffffff; --aj7:#ffffff; --aj8:#ffffff; --aj9:#ffffff; --aj10:#ffffff;
      --aj11:#ffffff; --aj12:#ffffff; --aj13:#ffffff; --aj14:#ffffff; --aj15:#ffffff;
      --uaq:#ffffff; --shj:#ffffff; --dxb:#ffffff; --accent:#ffffff;

      --good:#00a98f;
      --warn:#d89a00;
      --danger:#d54032;
      --table-data-font:clamp(30px, 4.6vw, 88px);
    }

    *{box-sizing:border-box}
    html,body{height:100%;}
    body{
      margin:0;
      height:100vh;
      overflow:hidden;
      color:var(--text);
      font-family:var(--font-en-bold);
      background:
        radial-gradient(950px 520px at 50% 6%, rgba(255,255,255,.10), transparent 62%),
        linear-gradient(135deg, #01669f 0%, var(--official-blue) 46%, #014b78 100%);
    }
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.10), transparent 22%, transparent 78%, rgba(0,0,0,.05)),
        radial-gradient(1000px 600px at 50% 55%, rgba(255,255,255,.06), transparent 70%);
      opacity:.90;
    }

    header{
      position:relative;
      height:280px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 24px 4px;
      text-align:center;
      z-index:1;
    }
    .brandLogo{
      width:min(980px, 72vw);
      max-height:190px;
      object-fit:contain;
      filter:drop-shadow(0 8px 22px rgba(0,0,0,.18));
      display:block;
      margin:0 auto 6px;
    }
    .titleWrap{width:100%;}
    .t{
    font-family:var(--font-ar-bold);
    font-size:clamp(42px, 4.8vw, 88px);
    font-weight:900;
    line-height:1.18;
    color:#fff;
    text-shadow:0 4px 18px rgba(0,0,0,.22);
    letter-spacing:.3px;
    direction:rtl;
}
    .s{
      font-family:var(--font-en-bold);
      color:var(--muted);
      font-size:clamp(13px, 1.05vw, 19px);
      font-weight:800;
      margin-top:5px;
      display:none;
    }
    header .right{
      position:absolute;
      right:26px;
      top:20px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pill{
      font-family:var(--font-en-bold);
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.55);
      color:#fff;
      background:rgba(1,92,146,.72);
      font-weight:900;
      box-shadow: inset 0 0 18px rgba(255,255,255,.06);
    }
    .clockPanel{
      min-width:210px;
      padding:12px 18px;
      border-radius:18px;
      border:3px solid var(--official-gray);
      background:rgba(1,92,146,.82);
      color:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.16), inset 0 0 18px rgba(255,255,255,.06);
      text-align:center;
      line-height:1.1;
    }
    .clockTime{
    font-family:var(--font-en-bold);
    font-size:clamp(52px, 5vw, 95px);
    font-weight:900;
    letter-spacing:.03em;
    line-height:1;
}

.clockDate{
    font-family:var(--font-en-bold);
    margin-top:10px;
    font-size:clamp(52px, 5vw, 95px);
    font-weight:800;
    color:rgba(255,255,255,.92);
    white-space:nowrap;
}
    .btn{
      font-family:var(--font-en-bold);
      cursor:pointer;
      user-select:none;
      padding:8px 10px;
      border-radius:12px;
      color:#fff;
      border:1px solid rgba(255,255,255,.45);
      background:rgba(1,92,146,.62);
      font-weight:900;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn.off{opacity:.55}
    .ico,.ico svg{width:16px;height:16px;display:inline-block;fill:currentColor}

    #err{
      position:relative; z-index:2;
      display:none;
      margin:0 28px 8px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.55);
      background:rgba(213,64,50,.28);
      color:#fff;
      font-weight:900;
    }

    .grid{
      position:relative;
      z-index:1;
      height:calc(100vh - 280px);
      padding:10px 28px 24px;
      display:grid;
      grid-template-columns:1fr;
    }
    .card{
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:18px;
      border:3px solid var(--official-gray);
      background:linear-gradient(180deg, rgba(1,92,146,.78), rgba(1,92,146,.66));
      box-shadow:var(--shadow);
    }
    .card h2{
      font-family:var(--font-ar-bold);
      margin:0;
      padding:16px 20px 14px;
      color:#fff;
      text-align:center;
      font-size:clamp(30px, 2.6vw, 52px);
      line-height:1.12;
      font-weight:900;
      border-bottom:3px solid var(--official-gray);
      background:rgba(1,92,146,.55);
      text-shadow:0 2px 12px rgba(0,0,0,.16);
    }
    .card h2 span{
      display:block;
      font-family:var(--font-en-bold);
      font-size:.62em;
      opacity:.94;
      margin-top:6px;
      letter-spacing:.08em;
    }
    .pad{
      flex:1;
      min-height:0;
      overflow:hidden;
      padding:0;
    }
    .muted{color:rgba(255,255,255,.80);}

    table{
      width:100%;
      height:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
      color:#fff;
    }
    thead tr{
      background:rgba(1,92,146,.72);
    }
    th,td{
      text-align:center;
      vertical-align:middle;
      border-right:3px solid var(--official-gray);
      border-bottom:3px solid var(--official-gray);
      padding:10px 12px;
      color:#fff;
    }
    th:last-child, td:last-child{border-right:none;}
    tbody tr:last-child td{border-bottom:none;}

    th{
      font-family:var(--font-en-bold);
      height:82px;
      font-size:clamp(28px, 2.2vw, 44px);
      font-weight:900;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:#ffffff;
      text-shadow:0 2px 12px rgba(0,0,0,.18);
      white-space:nowrap;
    }
    td{
      font-family:var(--font-en-bold);
      height:calc((100vh - 280px - 24px - 24px - 82px - 66px - 42px) / 7);
      font-size:var(--table-data-font);
      font-weight:900;
      line-height:1.08;
      text-shadow:0 2px 12px rgba(0,0,0,.14);
    }
    td.time,
    td.countdown,
    td.route,
    td.platform,
    td.status{
      font-family:var(--font-en-bold);
      font-size:var(--table-data-font);
      font-weight:900;
      color:#ffffff;
      letter-spacing:.02em;
      text-shadow:0 2px 12px rgba(0,0,0,.18);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    td.destination{
      font-family:var(--font-ar-bold);
      text-align:left;
      font-size:var(--table-data-font);
      font-weight:900;
      line-height:1.16;
      color:#fff;
      white-space:normal;
      word-break:normal;
      overflow:hidden;
      text-shadow:0 2px 12px rgba(0,0,0,.18);
    }

    .tag{
      font-family:var(--font-en-bold);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:0;
      border:none !important;
      background:none !important;
      box-shadow:none !important;
      color:#fff !important;
      font-weight:900;
      font-size:var(--table-data-font);
      line-height:1;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 2px 10px rgba(0,0,0,.18);
    }
    .tag.good{color:#19ffd8 !important;}
    .tag.warn{color:#ffd34d !important;}
    .tag.danger{color:#ff7265 !important;}
    .tag.route{
      background:none !important;
      border:none !important;
      color:#ffffff !important;
      min-width:0;
    }

    .ticker{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      min-height:42px;
      padding:8px 18px;
      border-top:3px solid var(--official-gray);
      color:rgba(255,255,255,.84);
      font-size:clamp(12px, 1vw, 16px);
      font-weight:800;
      background:rgba(1,92,146,.50);
    }

    /* Keep legacy classes safe even if not visible */
    .topBar,.cards,.rcard{display:none;}
    .label{color:var(--muted);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:900;}
    .big{font-size:54px;font-weight:900;letter-spacing:1px;line-height:1;}

    .notifOverlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:3vw;
    }
    .notifCard{
      width:min(1100px,92vw);
      max-height:88vh;
      background:linear-gradient(180deg, rgba(1,92,146,.98), rgba(1,75,120,.98));
      border:3px solid var(--official-gray);
      border-radius:22px;
      box-shadow:0 30px 80px rgba(0,0,0,.55);
      overflow:hidden;
      color:#fff;
    }
    .notifHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 22px;
      background:rgba(213,64,50,.26);
      border-bottom:3px solid var(--official-gray);
    }
    .notifTitle{font-size:34px;font-weight:900;line-height:1.1;}
    .notifClose{
      border:0;
      background:rgba(255,255,255,.16);
      color:#fff;
      width:46px;height:46px;
      border-radius:14px;
      font-size:30px;
      line-height:1;
      cursor:pointer;
    }
    .notifBody{
      padding:22px 22px 10px;
      font-size:28px;
      line-height:1.35;
      color:#fff;
      white-space:pre-wrap;
      overflow:auto;
      max-height:60vh;
    }
    .notifFooter{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 22px 18px;
      border-top:3px solid var(--official-gray);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.85);
      font-size:16px;
    }

    @keyframes blinkUrgent {
      0%{opacity:1;}
      50%{opacity:.25;}
      100%{opacity:1;}
    }
    .topBig.urgentBlink{color:var(--danger);animation:blinkUrgent 1s infinite;}

    @media (max-width:900px){
      header{height:170px;}
      .brandLogo{width:min(620px,82vw);max-height:132px;}
      header .right{top:8px;right:8px;transform:scale(.78);transform-origin:top right;}
      .clockPanel{min-width:170px;padding:10px 12px;}
      .grid{height:calc(100vh - 170px);padding:8px 12px 14px;}
      .card h2{font-size:20px;padding:10px;}
      th{font-size:18px;height:60px;}
      td{font-size:16px;padding:8px 6px;}
      td.time,td.countdown,td.route,td.platform,td.status,td.destination{font-size:clamp(26px, 7vw, 44px);}
      .tag{font-size:clamp(26px, 7vw, 44px);min-width:0;padding:6px 8px;}
    }
  

/* ===== Updated Header: Large Clear Logo on Left ===== */
header{
  position:relative !important;
  height:280px !important;
  display:grid !important;
  grid-template-columns:minmax(430px, 34vw) 1fr minmax(360px, 25vw) !important;
  align-items:center !important;
  column-gap:24px !important;
  padding:10px 28px 4px !important;
  text-align:center !important;
  z-index:1 !important;
}
.logoLeft{
  display:flex !important;
  align-items:center !important;
  justify-content:flex-start !important;
  min-width:0 !important;
  height:100% !important;
}
.leftLogo{
  width:min(620px, 34vw) !important;
  max-height:220px !important;
  height:auto !important;
  object-fit:contain !important;
  display:block !important;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,.28)) contrast(1.16) brightness(1.15) !important;
  image-rendering:auto !important;
  transform:translateZ(0) !important;
  backface-visibility:hidden !important;
}
.brandLogo{display:none !important;}
.titleWrap{
  width:100% !important;
  min-width:0 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  padding:0 10px !important;
}
.t{
  font-family:var(--font-ar-bold) !important;
  font-size:clamp(38px, 3.15vw, 72px) !important;
  font-weight:900 !important;
  line-height:1.12 !important;
  color:#fff !important;
  text-shadow:0 4px 18px rgba(0,0,0,.22) !important;
  letter-spacing:.2px !important;
  direction:rtl !important;
  white-space:nowrap !important;
  text-align:center !important;
}
header .right{
  position:relative !important;
  right:auto !important;
  top:auto !important;
  display:flex !important;
  align-items:center !important;
  justify-content:flex-end !important;
  gap:10px !important;
  min-width:0 !important;
  transform:none !important;
}
.clockPanel{
  min-width:330px !important;
  padding:14px 20px !important;
}
@media (max-width:900px){
  header{
    height:190px !important;
    grid-template-columns:1fr !important;
    grid-template-rows:auto auto !important;
    padding:8px 12px !important;
  }
  .logoLeft{justify-content:center !important;height:auto !important;}
  .leftLogo{width:min(520px, 86vw) !important;max-height:86px !important;}
  .titleWrap{padding:0 !important;}
  .t{font-size:clamp(22px, 5.6vw, 38px) !important;white-space:normal !important;}
  header .right{position:absolute !important;top:8px !important;right:8px !important;transform:scale(.78) !important;transform-origin:top right !important;}
  .clockPanel{min-width:170px !important;padding:10px 12px !important;}
  .grid{height:calc(100vh - 190px) !important;}
}
</style>

</head>

  function normalizeArabicLookupKey(value){
    return String(value || "").toUpperCase().replace(/\s+/g, " ").trim();
  }

  function hasArabicTextLocal(s){
    return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(String(s||""));
  }

  function getArabicDestination(destination, route){
    const dest = String(destination || "").trim();
    if(hasArabicTextLocal(dest)) return dest;
    const k1 = normalizeArabicLookupKey(dest);
    const k2 = normalizeArabicLookupKey(route);
    if(k1 && DESTINATION_AR_MAP[k1]) return DESTINATION_AR_MAP[k1];
    if(k2 && DESTINATION_AR_MAP[k2]) return DESTINATION_AR_MAP[k2];
    return dest || route || "";
  }

  function platformArabicSpeech(platform){
    const p = String(platform || "-").trim();
    const m = p.match(/^P\s*([0-9]+)$/i);
    if(m) return "رقم " + m[1];
    return p;
  }

  }

    const ar = String((routeObj || {}).display_name_ar || (routeObj || {}).destination_ar || "").trim();

    if(vb){

  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended"){ try{ audioCtx.resume(); }catch(e){} }

  function beepOnce(durationMs = 140, frequency = 880, volume = 0.20){
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = frequency;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    setTimeout(()=>{ try{osc.stop();}catch(e){} }, durationMs);
  }

    VOICES = [];
  }
}

if("speechSynthesis" in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = () => loadVoices();
}

function pickVoice(preferredLangs, nameHints=[]){
  const v = VOICES || [];
  const langs = preferredLangs.map(x=>String(x).toLowerCase());
  const hints = nameHints.map(x=>String(x).toLowerCase());

  for(const L of langs){
    const cands = v.filter(x=>String(x.lang||"").toLowerCase().startsWith(L));
    for(const h of hints){
      const found = cands.find(x=>String(x.name||"").toLowerCase().includes(h));
      if(found) return found;
    }
  }

  for(const L of langs){
    const found = v.find(x=>String(x.lang||"").toLowerCase().startsWith(L));
    if(found) return found;
  }

  for(const h of hints){
    const found = v.find(x=>String(x.name||"").toLowerCase().includes(h));
    if(found) return found;
  }

  return null;
}

function speakBilingual(enText, arText){
  try{
    if(!("speechSynthesis" in window)) return;

    loadVoices();

    const arVoice = pickVoice(
      ["ar-AE","ar-SA","ar-EG","ar"],
      ["fatima","hamdan","hala","zayd","zeina","microsoft","google"]
    );

    const enVoice = pickVoice(
      ["en-GB","en-US","en"],
      ["natural","neural","microsoft","google","zira","aria","jenny","guy","david"]
    );

    window.speechSynthesis.cancel();

    const u1 = new SpeechSynthesisUtterance(String(enText||""));
    u1.lang = enVoice ? enVoice.lang : "en-US";
    u1.rate = 1.0;
    if(enVoice) u1.voice = enVoice;

    const u2 = new SpeechSynthesisUtterance(String(arText||""));
    u2.lang = arVoice ? arVoice.lang : "ar-AE";
    u2.rate = 0.95;
    if(arVoice) u2.voice = arVoice;

    u1.onend = ()=>{ try{ window.speechSynthesis.speak(u2); }catch(e){} };

    window.speechSynthesis.speak(u1);

  }catch(e){}
}


function platformSpeech(platform){
  const p = String(platform || "-").trim();
  const m = p.match(/^P\s*([0-9]+)$/i);
  if(m) return "P " + m[1];
  return p;
}

function speakBilingualQueue(items){
  try{
    if(!("speechSynthesis" in window)) return;
    if(!Array.isArray(items) || !items.length) return;

    loadVoices();

    const arVoice = pickVoice(
      ["ar-AE","ar-SA","ar-EG","ar"],
      ["fatima","hamdan","hala","zayd","zeina","microsoft","google"]
    );
    const enVoice = pickVoice(
      ["en-GB","en-US","en"],
      ["natural","neural","microsoft","google","zira","aria","jenny","guy","david"]
    );

    window.speechSynthesis.cancel();

    const queue = [];
    items.forEach(pair=>{
      const enText = String(pair.en || "").trim();
      const arText = String(pair.ar || "").trim();
      if(enText){
        const u1 = new SpeechSynthesisUtterance(enText);
        u1.lang = enVoice ? enVoice.lang : "en-US";
        u1.rate = 1.0;
        if(enVoice) u1.voice = enVoice;
        queue.push(u1);
      }
      if(arText){
        const u2 = new SpeechSynthesisUtterance(arText);
        u2.lang = arVoice ? arVoice.lang : "ar-AE";
        u2.rate = 0.95;
        if(arVoice) u2.voice = arVoice;
        queue.push(u2);
      }
    });

    let i = 0;
    function speakNext(){
      if(i >= queue.length) return;
      const u = queue[i++];
      u.onend = () => setTimeout(speakNext, 350);
      window.speechSynthesis.speak(u);
    }
    speakNext();
  }catch(e){}
}

    function hasArabicText(s){
    return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(String(s||""));
  }

// ---------- Notification overlay ----------
  const notifOverlay = document.getElementById("notifOverlay");
  const notifTitle = document.getElementById("notifTitle");
  const notifContent = document.getElementById("notifContent");
  const notifTimer = document.getElementById("notifTimer");
  const notifCreated = document.getElementById("notifCreated");
  const notifClose = document.getElementById("notifClose");
  let lastNotifId = "";
  let notifHideTimer = null;
  let notifTickTimer = null;
  let notifEndsAt = 0;

  function fmtMMSS(ms){
    if(ms < 0) ms = 0;
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const r = s%60;
    return pad2(m) + ":" + pad2(r);
  }

  function hideNotification(){
    if(notifHideTimer){ clearTimeout(notifHideTimer); notifHideTimer = null; }
    if(notifTickTimer){ clearInterval(notifTickTimer); notifTickTimer = null; }
    if(notifOverlay) notifOverlay.style.display = "none";
  }

  async function showNotification(payload){
    if(!payload || !payload.active) return;

    lastNotifId = String(payload.id || payload.created_at || Date.now());
    const title = String(payload.title || "Notice").trim();
    const content = String(payload.content || "").trim();
    const durSec = Math.max(5, Math.min(parseInt(payload.duration || 20, 10) || 20, 600));

    if(notifTitle) notifTitle.textContent = title;
    if(notifContent) notifContent.textContent = content;
    if(notifCreated){
      const ts = payload.created_at ? String(payload.created_at) : "";
      notifCreated.textContent = ts ? ("Sent: " + ts) : "";
    }

    if(notifOverlay) notifOverlay.style.display = "flex";

    // Sound + voice (browser may require a user gesture once; we attempt anyway)
    try{ if(soundOn) beepPattern(); }catch(e){}
    try{
      if(voiceOn){
        const en = "Attention please. " + title + ". " + content;

        // If Python sends Arabic fields, prefer them:
        const titleAr = String(payload.title_ar || payload.title_arabic || "").trim();
        const contentAr = String(payload.content_ar || payload.content_arabic || "").trim();

        let arText = "";
        if(titleAr || contentAr){
          arText = (titleAr ? titleAr : title) + ". " + (contentAr ? contentAr : content);
        }else{
          // If the notification already contains Arabic letters, speak it as Arabic.
          const mixed = (title + " " + content);
          if(hasArabicText(mixed)){
            arText = title + ". " + content;
          }else{
            // English-only -> auto translate to Arabic
            const translated = await translateToArabic(title + ". " + content);
            arText = translated;
          }
        }

        const ar = arText ? ("تنبيه. " + arText) : "";
        speakBilingual(en, ar);
      }
    }catch(e){}

    // Auto hide
    notifEndsAt = Date.now() + durSec*1000;
    if(notifTimer) notifTimer.textContent = fmtMMSS(notifEndsAt - Date.now());
    if(notifTickTimer) clearInterval(notifTickTimer);
    notifTickTimer = setInterval(()=>{
      if(!notifTimer) return;
      const left = notifEndsAt - Date.now();
      notifTimer.textContent = fmtMMSS(left);
      if(left <= 0) hideNotification();
    }, 250);

    if(notifHideTimer) clearTimeout(notifHideTimer);
    notifHideTimer = setTimeout(hideNotification, durSec*1000);
  }

  async function fetchJsonSmart(baseUrls){
    const stamp = String(Date.now());
    for(const u of baseUrls){
      const url = u + stamp;
      try{
        const res = await fetch(url, { cache: "no-store" });
        if(!res.ok) continue;
        return await res.json();
      }catch(e){}
    }
    return null;
  }

  async function checkNotification(){
    const payload = await fetchJsonSmart(NOTIF_URLS);
    if(!payload || !payload.active) return;
    const pid = String(payload.id || payload.created_at || "");
    if(!pid) return;
    if(pid === lastNotifId) return;
    showNotification(payload);
  }

  // Start notification polling
  setInterval(checkNotification, 4000);
  checkNotification();

  if(notifClose) notifClose.addEventListener("click", hideNotification);
  // help unlock audio on the first user gesture (touch/click)
  document.addEventListener("click", ()=>{ try{ ensureAudio(); }catch(e){} }, { once:true });

  function parseTime(dateStr, t){
    const parts = String(t||"").split(":");
    const H = parseInt(parts[0]||"0",10);
    const M = parseInt(parts[1]||"0",10);
    const d = new Date(dateStr + "T00:00:00");
    d.setHours(H, M, 0, 0);
    return d;
  }

  function fmtCountdown(ms){
    if(ms < 0) ms = 0;
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const r = s%60;
    return pad2(m) + ":" + pad2(r);
  }

  function statusTag(ms){
    const min = ms/60000;
    if(min <= 2) return {cls:"danger", txt:"Now"};
    if(min <= 10) return {cls:"warn", txt:"Soon"};
    return {cls:"good", txt:"Upcoming"};
  }

  function routeKey(route){
    const s = String(route||"").toUpperCase().replace(/\s+/g,"").trim();
    const m = s.match(/AJ0*([0-9]{1,2})/);
    if(m) return "AJ" + String(parseInt(m[1],10));
    return s;
  }
  function routePriority(route){
    const k = routeKey(route);
    const idx = ROUTE_PRIORITY.indexOf(k);
    return (idx >= 0) ? idx : 999;
  }
  function routeColor(route){
    const k = routeKey(route);
    return ROUTE_COLORS[k] || "var(--accent)";
  }

  async function fetchFirst(){
    for(const u of CANDIDATE_URLS){
      try{
        const r = await fetch(u, {cache:"no-store"});
        if(r.ok) return {url:u, json: await r.json()};
      }catch(e){}
    }
    throw new Error("Failed to load schedules.json. Check that schedules.json exists at /bus-schedules/data/ or /bus-schedules/.");
  }

  function findDayForToday(routeObj, todayISO){
    if(!routeObj || !routeObj.days) return null;
    return routeObj.days.find(d => d.date === todayISO) || null;
  }

  function getTomorrowFirstTrip(todayISO){
    if(!schedules || !schedules.routes) return null;
    const d = new Date(todayISO + "T00:00:00");
    d.setDate(d.getDate() + 1);
    const tISO = ymd(d);

    let best = null; // {time, route, platform}
    schedules.routes.forEach(r=>{
      const day = r.days ? r.days.find(x=>x.date===tISO) : null;
      if(!day) return;
      (day.buses||[]).forEach(b=>{
        (b.departures||[]).forEach(t=>{
          const dt = parseTime(tISO, t);
          if(!best || dt < best.dt){
            best = {dt, time: t, route: r.route, bus: b.bus, destination: getRouteDestinationEn(r), destination_en: getRouteDestinationEn(r), destination_ar: getRouteDestinationAr(r), platform: (b.platform || r.platform || ""), date: tISO};
          }
        });
      });
    });
    return best;
  }

  function buildUpcoming(todayISO){
    const nowD = now();
    const nowMs = nowD.getTime();
    let list = [];
    schedules.routes.forEach(r=>{
      const day = findDayForToday(r, todayISO);
      if(!day) return;
      (day.buses||[]).forEach(b=>{
        (b.departures||[]).forEach(t=>{
          const dt = parseTime(todayISO, t);
          const ms = dt.getTime() - nowMs;
          if(ms >= 0){
            list.push({
              dt, ms, time: t, route: r.route, bus: b.bus,
              destination: getRouteDestinationEn(r),
              destination_en: getRouteDestinationEn(r),
              destination_ar: getRouteDestinationAr(r),
              platform: (b.platform || r.platform || "")
            });
          }
        });
      });
    });
    list.sort((a,b)=>a.ms - b.ms);
    return list;
  }

  function renderTop(nextItem, todayISO){
    if(elDateTag) elDateTag.textContent = "Date: " + todayISO;

    if(!nextItem){
      if(elTopC) if(elTopC) elTopC.textContent = "--:--";
      if(elTopD) elTopD.textContent = "No upcoming trips";
      if(elTopC) elTopC.classList.remove("urgentBlink");
      return;
    }

    if(elTopC) elTopC.textContent = fmtCountdown(nextItem.ms);
    if(elTopD) elTopD.textContent = (nextItem.destination_en || nextItem.destination || nextItem.route) + " / " + (nextItem.destination_ar || "") + "  •  Platform " + (nextItem.platform || "-") + "  •  " + nextItem.time;

    // Blink when 1 minute or less
    if(nextItem.ms <= 60000){
      if(elTopC) elTopC.classList.add("urgentBlink");
    }else{
      if(elTopC) elTopC.classList.remove("urgentBlink");
    }
  }

  function renderDeparturesTable(upcoming, todayISO){
    // rotation 1–10 then 11–20
    const sliced = upcoming.slice(0, TOTAL_SHOW);
    const start = pageIndex * PAGE_SIZE;
    const view = sliced.slice(start, start + PAGE_SIZE);

    if(elRot){
      const a = start + 1;
      const b = Math.min(start + PAGE_SIZE, sliced.length || (start+PAGE_SIZE));
      elRot.textContent = "Showing " + a + "–" + b;
    }

    if(!view.length){
      elRows.innerHTML = '<tr><td colspan="6" class="muted">No upcoming trips</td></tr>';
      return;
    }

    elRows.innerHTML = "";
    view.forEach(item=>{
      const tag = statusTag(item.ms);
      const tr = document.createElement("tr");

      const tdT = document.createElement("td");
      tdT.className = "time";
      tdT.textContent = item.time;

      const tdC = document.createElement("td");
      tdC.className = "countdown";
      tdC.textContent = fmtCountdown(item.ms);

      const tdS = document.createElement("td");
      tdS.className = "status";
      tdS.innerHTML = `<span class="tag ${tag.cls}">${tag.txt}</span>`;
      const tdP = document.createElement("td");
      tdP.className = "platform";
      tdP.innerHTML = `<span class="tag warn">${item.platform || "-"}</span>`;

      const tdR = document.createElement("td");
      tdR.className = "route";
      const rc = routeColor(item.route);
      tdR.innerHTML = `<span class="tag route" style="border-color:${rc};color:${rc}">${item.route}</span>`;

      const tdD = document.createElement("td");
      tdD.className = "destination";
      tdD.textContent = (item.destination_en || item.destination || "-") + (item.destination_ar ? " / " + item.destination_ar : "");

      tr.appendChild(tdT); tr.appendChild(tdC); tr.appendChild(tdS); tr.appendChild(tdP); tr.appendChild(tdR); tr.appendChild(tdD);
      elRows.appendChild(tr);
    });
  }

  function renderRouteCards(upcoming, todayISO){
    if(!elCards) return;
    // Next per route mini-cards (super clear for passengers)
    const nextByRoute = {};
    upcoming.forEach(it=>{
      if(!nextByRoute[it.route]) nextByRoute[it.route] = it;
    });

    const routesToday = schedules.routes
      .filter(r => !!findDayForToday(r, todayISO))
      .slice()
      .sort((a,b)=>{
        const pa = routePriority(a.route);
        const pb = routePriority(b.route);
        if(pa !== pb) return pa - pb;
        return String(a.route).localeCompare(String(b.route));
      });

    if(!routesToday.length){
      if(elCards) elCards.innerHTML = '<div class="muted">No schedules for today</div>';
      return;
    }

    elCards.innerHTML = "";
    routesToday.forEach(r=>{
      const it = nextByRoute[r.route] || null;

      const card = document.createElement("div");
      card.className = "rcard";
      card.style.setProperty("--accent", routeColor(r.route));
      card.style.setProperty("border-color","rgba(255,255,255,0.10)");

      const left = document.createElement("div");
      left.className = "rL";
      left.innerHTML = `
        <div class="rName">${r.route}</div>
        <div class="rSub">${getRouteDestinationEn(r)}${getRouteDestinationAr(r) ? " / " + getRouteDestinationAr(r) : ""} • Platform ${r.platform || "-"}</div>
      `;

      const right = document.createElement("div");
      right.style.textAlign = "right";

      if(it){
        right.innerHTML = `
          <div class="rT">${it.time}</div>
          <div class="rB">Platform ${it.platform || "-"} • in <span class="mins">${Math.max(0, Math.round(it.ms/60000))}</span> min</div>
        `;
      }else{
        right.innerHTML = `
          <div class="rT">—</div>
          <div class="rB">No more trips today</div>
        `;
      }

      card.style.setProperty("box-shadow","none");
      card.style.borderColor = "rgba(255,255,255,0.10)";
      card.style.background = "rgba(255,255,255,0.04)";
      card.style.position = "relative";
      card.style.overflow = "hidden";
      card.style.paddingLeft = "14px";
      card.style.setProperty("padding","12px 12px 12px 12px");
      card.style.setProperty("border-radius","16px");
      card.style.setProperty("display","flex");
      card.style.setProperty("justify-content","space-between");
      card.style.setProperty("align-items","center");

      // left color bar
      const bar = document.createElement("div");
      bar.style.position="absolute";
      bar.style.left="0";
      bar.style.top="0";
      bar.style.bottom="0";
      bar.style.width="8px";
      bar.style.background = routeColor(r.route);
      bar.style.opacity="0.95";
      card.appendChild(bar);

      card.appendChild(left);
      card.appendChild(right);
      elCards.appendChild(card);
    });
  }

  function serviceEndedMessage(todayISO, upcoming){
    // After last trip, show “Service ended — next service starts tomorrow at XX:XX”.
    if(upcoming.length) return null;

    const tmr = getTomorrowFirstTrip(todayISO);
    if(!tmr) return "Service ended — no schedules found for tomorrow";
    return "Service ended — next service starts tomorrow at " + tmr.time + " (" + (tmr.destination_en || tmr.destination || tmr.route) + ", Platform " + (tmr.platform || "-") + ")";
  }

  function checkAlerts(upcoming, todayISO){
    if(!upcoming || !upcoming.length) return;
    if(!soundOn && !voiceOn) return;

    // Alert window: 2 minutes before departure (including at departure)
    const first = upcoming[0];
    if(!first) return;
    const min = first.ms / 60000;
    if(min < 0 || min > 2) return;

    // Announce all trips that depart at the same nearest departure time.
    const sameTimeTrips = upcoming.filter(it => it && it.dt && first.dt && it.dt.getTime() === first.dt.getTime());

    const newTrips = [];
    sameTimeTrips.forEach(it=>{
      const key = todayISO + "|" + it.route + "|" + (it.destination_en || it.destination || "") + "|" + (it.destination_ar || "") + "|" + (it.platform || "") + "|" + it.time;
      if(!alerted.has(key)){
        alerted.add(key);
        newTrips.push(it);
      }
    });

    if(!newTrips.length) return;

    if(soundOn){
      // One clear beep pattern before the voice sequence.
      beepPattern();
    }

    if(voiceOn){
      const pairs = newTrips.map((it, idx)=>{
        const dest = it.destination_en || it.destination || it.route;
        const destAr = it.destination_ar || getArabicDestination(dest, it.route);
        const plat = it.platform || "-";
        const platVoice = platformSpeech(plat);
        const prefix = newTrips.length > 1 ? `Trip ${idx + 1}. ` : "Next trip. ";
        const platAr = platformArabicSpeech(plat);
        return {
          en: `${prefix}${dest}. Departure from Platform ${platVoice}. Departure time ${it.time}.`,
          ar: `تنبيه للركاب. الرحلة ${newTrips.length > 1 ? String(idx + 1) : "التالية"} متجهة إلى ${destAr}. المغادرة من المنصة ${platAr}. وقت المغادرة ${it.time}.`
        };
      });
      speakBilingualQueue(pairs);
    }
  }

  async function load(){
    try{
      clearErr();
      const out = await fetchFirst();
      schedules = out.json;

      // Override route colors from schedules.json (if provided)
      try{
        if(schedules && schedules.route_colors){
          for(const [k,v] of Object.entries(schedules.route_colors)){
            const kk = String(k||"").toUpperCase().replace(/\s+/g,"");
            if(kk){ ROUTE_COLORS[kk] = v; }
          }
        }
      }catch(e){}


      const todayISO = ymd(now());
      elSub.textContent = "Today: " + todayISO + " • Public Transport Trip Scheduler System";
      elLast.textContent = "Last update: " + (schedules.generated_at || "-");
      elNet.textContent = "Online: " + (navigator.onLine ? "Yes" : "No");

      // If today not found in ANY route => show "No schedules for today" (no fallback)
      const anyToday = (schedules.routes || []).some(r => !!findDayForToday(r, todayISO));
      if(!anyToday){
        elRows.innerHTML = '<tr><td colspan="6" class="muted">No schedules for today</td></tr>';
        if(elCards) elCards.innerHTML = '<div class="muted">No schedules for today</div>';
        if(elTopC) elTopC.textContent = "--:--";
        if(elTopD) elTopD.textContent = "No schedules for today";
        if(elState) elState.textContent = "No schedules for today";
        return;
      }

      const upcoming = buildUpcoming(todayISO);
      const nextItem = upcoming[0] || null;

      renderTop(nextItem, todayISO);
      renderDeparturesTable(upcoming, todayISO);
      renderRouteCards(upcoming, todayISO);

      const ended = serviceEndedMessage(todayISO, upcoming);
      if(elState){
        elState.textContent = ended ? ended : "Service running";
      }

      // Also show ended state in top if applicable
      if(ended){
        if(elTopD) elTopD.textContent = ended;
      }

      checkAlerts(upcoming, todayISO);
    }catch(e){
      showErr(String(e && e.message ? e.message : e));
    }
  }

  function rotateIfNeeded(){
    const t = Date.now();
    if(t - lastRotate >= ROTATE_MS){
      lastRotate = t;
      pageIndex = (pageIndex + 1) % 2; // 0<->1
    }
  }

  function tick(){
    updateClockBox();
    rotateIfNeeded();
    // Re-render from already-loaded schedules (fast), but if not yet, do nothing.
    if(!schedules || !schedules.routes) return;

    const todayISO = ymd(now());
    const anyToday = (schedules.routes || []).some(r => !!findDayForToday(r, todayISO));
    if(!anyToday){
      elRows.innerHTML = '<tr><td colspan="6" class="muted">No schedules for today</td></tr>';
      if(elCards) elCards.innerHTML = '<div class="muted">No schedules for today</div>';
      if(elTopC) elTopC.textContent = "--:--";
      if(elTopD) elTopD.textContent = "No schedules for today";
      if(elState) elState.textContent = "No schedules for today";
      return;
    }

    const upcoming = buildUpcoming(todayISO);
    const nextItem = upcoming[0] || null;

    renderTop(nextItem, todayISO);
    renderDeparturesTable(upcoming, todayISO);
    renderRouteCards(upcoming, todayISO);

    const ended = serviceEndedMessage(todayISO, upcoming);
    if(elState){
      elState.textContent = ended ? ended : "Service running";
    }
    if(ended){
      if(elTopD) elTopD.textContent = ended;
    }

    checkAlerts(upcoming, todayISO);
  }

  function onSoundToggle(){
    soundOn = !soundOn;
    saveTogglePrefs();
    syncButtons();
    // Important: audio needs user gesture at least once in many browsers; we re-init here.
    if(soundOn){
      try{ ensureAudio(); beepOnce(90, 700, 0.12); }catch(e){}
    }
  }
  function onVoiceToggle(){
    voiceOn = !voiceOn;
    saveTogglePrefs();
    syncButtons();
    if(voiceOn){
      speakBilingual("Voice alerts enabled.", "تم تفعيل التنبيه الصوتي.");
    }else{
      try{ if("speechSynthesis" in window) window.speechSynthesis.cancel(); }catch(e){}
    }
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    loadTogglePrefs();

    const sb = document.getElementById("soundBtn");
    const vb = document.getElementById("voiceBtn");
    if(sb) sb.addEventListener("click", onSoundToggle);
    if(vb) vb.addEventListener("click", onVoiceToggle);

    updateClockBox();
    load();
    setInterval(tick, 1000);
    setInterval(load, 60*1000);
  });

})();

async function translateToArabic(text){
  try{
    const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=" + encodeURIComponent(text);
    const res = await fetch(url);
    const data = await res.json();
    return data[0].map(x=>x[0]).join("");
  }catch(e){
    return "";
  }
}
